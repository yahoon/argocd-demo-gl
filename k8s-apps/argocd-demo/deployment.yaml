apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-demo-gl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-demo-gl
  template:
    metadata: 
      labels:
        app: argocd-demo-gl
    spec:
      containers:
      - name: nginx
        image: quay.io/yahoon/argocd-demo-gl:v3
        ports:
        - containerPort: 80

